<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thapliyal Bakers | Premium Cakes</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        .brand-font { font-family: 'Pacifico', cursive; }
        body { font-family: 'Quicksand', sans-serif; }
        
        .cart-sidebar { 
            transition: transform 0.3s ease-in-out; 
        }
        
        /* Transparent Cutout Effect for Logo */
        .logo-cutout {
            mix-blend-mode: multiply; /* Helps remove white backgrounds if any */
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
            transition: transform 0.3s ease;
        }
        .logo-cutout:hover {
            transform: scale(1.1);
        }

        .no-scrollbar::-webkit-scrollbar { 
            display: none; 
        }
    </style>
</head>
<body class="bg-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        const LOGO_URL = "logo.jpg"; 

        const PRODUCTS = [
            { id: 1, name: "Chocolate Truffle Cake", price: 599, category: "Cakes", img: "https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=500" },
            { id: 2, name: "Red Velvet Delight", price: 749, category: "Cakes", img: "https://images.unsplash.com/photo-1614707267537-b85aaf00c4b7?w=500" },
            { id: 3, name: "Vanilla Cupcake (Set of 6)", price: 399, category: "Cupcakes", img: "https://images.unsplash.com/photo-1550617931-e17a7b70dce2?w=500" },
            { id: 4, name: "Fresh Fruit Cake", price: 899, category: "Cakes", img: "https://images.unsplash.com/photo-1535141192574-5d4897c825a1?w=500" },
            { id: 5, name: "Choco Lava Cupcake", price: 149, category: "Cupcakes", img: "https://images.unsplash.com/photo-1576618148400-f54bed99fcfd?w=500" },
            { id: 6, name: "Butterscotch Crunch", price: 549, category: "Cakes", img: "https://images.unsplash.com/photo-1563729784474-d77dbb933a9e?w=500" },
        ];

        function App() {
            const [cart, setCart] = useState([]);
            const [searchTerm, setSearchTerm] = useState("");
            const [activeCategory, setActiveCategory] = useState("All");
            const [isCartOpen, setIsCartOpen] = useState(false);

            const filteredProducts = useMemo(() => {
                return PRODUCTS.filter(p => 
                    (activeCategory === "All" || p.category === activeCategory) &&
                    p.name.toLowerCase().includes(searchTerm.toLowerCase())
                );
            }, [searchTerm, activeCategory]);

            const addToCart = (product) => {
                setCart([...cart, { ...product, cartId: Date.now() }]);
                setIsCartOpen(true);
            };

            const removeFromCart = (cartId) => {
                setCart(cart.filter(item => item.cartId !== cartId));
            };

            const cartTotal = cart.reduce((sum, item) => sum + item.price, 0);

            const handleCheckout = () => {
                const message = `Hello Thapliyal Bakers! I want to order:\n${cart.map(i => `- ${i.name} (₹${i.price})`).join('\n')}\n\nTotal: ₹${cartTotal}`;
                const whatsappUrl = `https://wa.me/91XXXXXXXXXX?text=${encodeURIComponent(message)}`;
                window.open(whatsappUrl, '_blank');
            };

            return (
                <div className="min-h-screen">
                    {/* Professional Header - No more circle! */}
                    <nav className="bg-white border-b sticky top-0 z-40 px-4 py-3">
                        <div className="container mx-auto flex items-center justify-between">
                            
                            <div className="flex-1 flex md:hidden">
                                <i className="fa-solid fa-magnifying-glass text-xl text-gray-500"></i>
                            </div>

                            {/* Logo Area without Circle */}
                            <div className="flex items-center gap-4">
                                <img 
                                    src={LOGO_URL} 
                                    alt="Logo" 
                                    className="h-20 w-auto md:h-28 logo-cutout"
                                />
                                <h1 className="brand-font text-3xl md:text-5xl text-pink-700 tracking-tight">
                                    Thapliyal Bakers
                                </h1>
                            </div>

                            <div className="flex-1 flex justify-end">
                                <button onClick={() => setIsCartOpen(true)} className="relative p-3 bg-pink-50 rounded-2xl text-pink-600 shadow-sm hover:scale-110 transition">
                                    <i className="fa-solid fa-bag-shopping text-2xl"></i>
                                    {cart.length > 0 && (
                                        <span className="absolute -top-1 -right-1 bg-pink-600 text-white text-[10px] rounded-full h-5 w-5 flex items-center justify-center font-bold ring-2 ring-white">
                                            {cart.length}
                                        </span>
                                    )}
                                </button>
                            </div>
                        </div>
                    </nav>

                    <header className="bg-pink-50 py-16 text-center px-4">
                        <div className="container mx-auto max-w-4xl">
                            <h2 className="text-4xl md:text-5xl font-extrabold text-gray-900 mb-4 tracking-tight">
                                Cakes Baked with Love ❤️
                            </h2>
                            <p className="text-pink-600 text-lg md:text-xl font-bold uppercase tracking-widest">
                                Special Midnight & Same Day Delivery
                            </p>
                            <div className="max-w-xl mx-auto mt-10 relative">
                                <i className="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-gray-400"></i>
                                <input 
                                    type="text" 
                                    placeholder="Search for cakes..." 
                                    className="w-full bg-white border-none rounded-full px-14 py-4 text-lg shadow-md focus:ring-2 focus:ring-pink-500 outline-none"
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                            </div>
                        </div>
                    </header>

                    <div className="container mx-auto px-4 py-8 flex gap-4 overflow-x-auto no-scrollbar">
                        {["All", "Cakes", "Cupcakes", "Personalized"].map(cat => (
                            <button 
                                key={cat}
                                onClick={() => setActiveCategory(cat)}
                                className={`px-8 py-3 rounded-full text-base font-semibold whitespace-nowrap transition shadow-sm ${activeCategory === cat ? 'bg-pink-600 text-white shadow-lg' : 'bg-white border text-gray-600 hover:border-pink-500 hover:text-pink-500'}`}
                            >
                                {cat}
                            </button>
                        ))}
                    </div>

                    <main className="container mx-auto px-4 pb-24">
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10">
                            {filteredProducts.map(product => (
                                <div key={product.id} className="bg-white rounded-[2rem] border border-gray-100 overflow-hidden hover:shadow-2xl transition-all duration-300 group">
                                    <div className="relative h-72 overflow-hidden">
                                        <img src={product.img} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
                                        <div className="absolute top-4 left-4 bg-white/90 backdrop-blur-sm px-4 py-1.5 rounded-full text-xs font-black text-pink-600">
                                            {product.category}
                                        </div>
                                    </div>
                                    <div className="p-8">
                                        <h3 className="text-2xl font-bold text-gray-800 mb-1">{product.name}</h3>
                                        <div className="flex justify-between items-end mt-6">
                                            <span className="text-3xl font-extrabold text-gray-900">₹{product.price}</span>
                                            <button 
                                                onClick={() => addToCart(product)}
                                                className="bg-pink-600 text-white px-8 py-3 rounded-2xl font-bold hover:bg-pink-700 active:scale-95 transition shadow-lg shadow-pink-100"
                                            >
                                                Add to Bag
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* Cart Sidebar */}
                    <div className={`fixed inset-0 z-[100] ${isCartOpen ? 'visible' : 'invisible'}`}>
                        <div className={`absolute inset-0 bg-black/40 backdrop-blur-sm transition-opacity ${isCartOpen ? 'opacity-100' : 'opacity-0'}`} onClick={() => setIsCartOpen(false)}></div>
                        <div className={`absolute right-0 top-0 h-full w-full max-w-md bg-white shadow-2xl p-8 cart-sidebar flex flex-col ${isCartOpen ? 'translate-x-0' : 'translate-x-full'}`}>
                            <div className="flex justify-between items-center mb-8">
                                <h2 className="text-2xl font-black text-gray-800 flex items-center gap-2">
                                    <i className="fa-solid fa-cart-shopping text-pink-500"></i>
                                    My Basket
                                </h2>
                                <button onClick={() => setIsCartOpen(false)} className="h-10 w-10 flex items-center justify-center rounded-full bg-gray-50 text-gray-500">
                                    <i className="fa-solid fa-xmark"></i>
                                </button>
                            </div>

                            <div className="flex-1 overflow-y-auto space-y-6 pr-2 no-scrollbar">
                                {cart.length === 0 ? (
                                    <div className="h-full flex flex-col items-center justify-center text-center py-20 text-gray-400">
                                        <i className="fa-solid fa-cake-candles text-5xl mb-4"></i>
                                        <p>Your basket is looking empty!</p>
                                    </div>
                                ) : (
                                    cart.map(item => (
                                        <div key={item.cartId} className="flex gap-4 border-b pb-5">
                                            <img src={item.img} className="w-20 h-20 object-cover rounded-2xl" />
                                            <div className="flex-1">
                                                <h4 className="font-bold text-gray-800 leading-tight">{item.name}</h4>
                                                <div className="flex items-center justify-between mt-2">
                                                    <p className="text-pink-600 font-extrabold text-lg">₹{item.price}</p>
                                                    <button onClick={() => removeFromCart(item.cartId)} className="text-gray-300 hover:text-red-500 transition">
                                                        <i className="fa-solid fa-trash-can"></i>
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>

                            {cart.length > 0 && (
                                <div className="pt-6 bg-white border-t space-y-4">
                                    <div className="flex justify-between items-center">
                                        <span className="text-gray-500 font-bold">Total Amount</span>
                                        <span className="text-3xl font-black text-gray-900">₹{cartTotal}</span>
                                    </div>
                                    <button 
                                        onClick={handleCheckout}
                                        className="w-full bg-green-600 text-white py-5 rounded-2xl font-bold text-lg hover:bg-green-700 transition shadow-xl flex items-center justify-center gap-2"
                                    >
                                        <i className="fa-brands fa-whatsapp text-2xl"></i>
                                        Order on WhatsApp
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
