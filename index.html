<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thapliyal Bakers | Premium Cakes & More</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Modern Script Font for Thapliyal Bakers */
        .brand-font {
            font-family: 'Great Vibes', cursive;
        }
        /* Base font for all other text */
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #fdfafb; /* Very light pink base */
        }
        .cart-sidebar { 
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .no-scrollbar::-webkit-scrollbar { 
            display: none; 
        }
        
        /* Modernized Logo Cutout with no border */
        .logo-cutout {
            object-fit: contain;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.08));
        }

        /* Clean Card Styling */
        .cake-card {
            transition: all 0.3s ease;
        }
        .cake-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(216, 27, 96, 0.08);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // Path should match your filename in GitHub exactly
        const LOGO_URL = "logo.jpg"; 

        const PRODUCTS = [
            { id: 1, name: "Chocolate Truffle Cake", price: 599, category: "Cakes", img: "https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=600" },
            { id: 2, name: "Red Velvet Delight", price: 749, category: "Cakes", img: "https://images.unsplash.com/photo-1614707267537-b85aaf00c4b7?w=600" },
            { id: 3, name: "Vanilla Cupcake (Set of 6)", price: 399, category: "Cupcakes", img: "https://images.unsplash.com/photo-1550617931-e17a7b70dce2?w=600" },
            { id: 4, name: "Fresh Fruit Cake", price: 899, category: "Cakes", img: "https://images.unsplash.com/photo-1535141192574-5d4897c825a1?w=600" },
            { id: 5, name: "Choco Lava Cupcake", price: 149, category: "Cupcakes", img: "https://images.unsplash.com/photo-1576618148400-f54bed99fcfd?w=600" },
            { id: 6, name: "Butterscotch Crunch", price: 549, category: "Cakes", img: "https://images.unsplash.com/photo-1563729784474-d77dbb933a9e?w=600" },
        ];

        function App() {
            const [cart, setCart] = useState([]);
            const [searchTerm, setSearchTerm] = useState("");
            const [activeCategory, setActiveCategory] = useState("All");
            const [isCartOpen, setIsCartOpen] = useState(false);

            const filteredProducts = useMemo(() => {
                return PRODUCTS.filter(p => 
                    (activeCategory === "All" || p.category === activeCategory) &&
                    p.name.toLowerCase().includes(searchTerm.toLowerCase())
                );
            }, [searchTerm, activeCategory]);

            const addToCart = (product) => {
                setCart([...cart, { ...product, cartId: Date.now() }]);
                setIsCartOpen(true);
            };

            const removeFromCart = (cartId) => {
                setCart(cart.filter(item => item.cartId !== cartId));
            };

            const cartTotal = cart.reduce((sum, item) => sum + item.price, 0);

            return (
                <div className="min-h-screen">
                    {/* Professional Redesigned Header */}
                    <nav className="bg-white border-b border-gray-100 sticky top-0 z-50 px-4 py-2">
                        <div className="max-w-7xl mx-auto flex items-center justify-between">
                            
                            {/* Left: Branding with Transparent Logo Cutout */}
                            <div className="flex items-center gap-3">
                                <img 
                                    src={LOGO_URL} 
                                    alt="Thapliyal Bakers Logo" 
                                    className="h-16 w-auto md:h-20 logo-cutout"
                                />
                                <h1 className="brand-font text-3xl md:text-5xl text-[#d81b60]">
                                    Thapliyal Bakers
                                </h1>
                            </div>

                            {/* Center: Top Navigation Elements (Clean eCommerce Feel) */}
                            <div className="flex items-center gap-6">
                                <div className="relative group hidden md:block">
                                    <i className="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-pink-500"></i>
                                    <input 
                                        type="text" 
                                        placeholder="Search for cakes..." 
                                        className="bg-gray-50 border border-gray-100 rounded-full px-12 py-2 w-64 focus:ring-2 focus:ring-pink-100 outline-none transition"
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                    />
                                </div>
                                
                                <button onClick={() => setIsCartOpen(true)} className="relative p-3 bg-pink-50 rounded-full text-pink-600 hover:bg-pink-100 transition shadow-sm">
                                    <i className="fa-solid fa-bag-shopping text-2xl"></i>
                                    {cart.length > 0 && (
                                        <span className="absolute -top-1 -right-1 bg-pink-600 text-white text-[10px] rounded-full h-5 w-5 flex items-center justify-center font-bold ring-2 ring-white">
                                            {cart.length}
                                        </span>
                                    )}
                                </button>
                            </div>
                        </div>
                    </nav>

                    {/* Clean Category Filters */}
                    <div className="max-w-7xl mx-auto px-4 py-10 flex gap-4 overflow-x-auto no-scrollbar">
                        {["All", "Cakes", "Cupcakes", "Personalized"].map(cat => (
                            <button 
                                key={cat}
                                onClick={() => setActiveCategory(cat)}
                                className={`px-8 py-3 rounded-full text-base font-semibold whitespace-nowrap transition shadow-sm ${activeCategory === cat ? 'bg-pink-600 text-white shadow-lg shadow-pink-200' : 'bg-white border text-gray-600 hover:border-pink-300 hover:text-pink-600'}`}
                            >
                                {cat}
                            </button>
                        ))}
                    </div>

                    {/* Product Grid */}
                    <main className="max-w-7xl mx-auto px-4 pb-24">
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10">
                            {filteredProducts.map(product => (
                                <div key={product.id} className="cake-card bg-white rounded-3xl border border-gray-100 overflow-hidden shadow-sm group">
                                    <div className="relative h-72 overflow-hidden">
                                        <img src={product.img} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
                                        <div className="absolute top-4 left-4 bg-white/90 backdrop-blur-sm px-4 py-1.5 rounded-full text-xs font-black uppercase text-pink-600 tracking-wider">
                                            {product.category}
                                        </div>
                                    </div>
                                    <div className="p-8">
                                        <h3 className="text-xl font-bold text-gray-800 mb-1">{product.name}</h3>
                                        <div className="flex justify-between items-end mt-6">
                                            <span className="text-3xl font-extrabold text-gray-900">₹{product.price}</span>
                                            <button 
                                                onClick={() => addToCart(product)}
                                                className="bg-pink-600 text-white px-8 py-3 rounded-2xl font-bold hover:bg-pink-700 active:scale-95 transition shadow-lg shadow-pink-100"
                                            >
                                                Add to Bag
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* Cart Sidebar */}
                    <div className={`fixed inset-0 z-[100] ${isCartOpen ? 'visible' : 'invisible'}`}>
                        <div className={`absolute inset-0 bg-black/30 backdrop-blur-sm transition-opacity duration-300 ${isCartOpen ? 'opacity-100' : 'opacity-0'}`} onClick={() => setIsCartOpen(false)}></div>
                        <div className={`absolute right-0 top-0 h-full w-full max-w-md bg-white shadow-2xl p-8 cart-sidebar flex flex-col ${isCartOpen ? 'translate-x-0' : 'translate-x-full'}`}>
                            <div className="flex justify-between items-center mb-8 border-b border-gray-100 pb-6">
                                <h2 className="text-2xl font-bold flex items-center gap-2">
                                    <i className="fa-solid fa-cart-shopping text-pink-500"></i>
                                    My Basket
                                </h2>
                                <button onClick={() => setIsCartOpen(false)} className="h-10 w-10 flex items-center justify-center rounded-full bg-gray-50 hover:bg-gray-100 transition text-gray-500">
                                    <i className="fa-solid fa-xmark text-lg"></i>
                                </button>
                            </div>

                            <div className="flex-1 overflow-y-auto space-y-6 pr-2 no-scrollbar">
                                {cart.length === 0 ? (
                                    <div className="h-full flex flex-col items-center justify-center text-center text-gray-400">
                                        <div className="h-20 w-20 bg-pink-50 rounded-full flex items-center justify-center mb-5">
                                            <i className="fa-solid fa-cake-candles text-4xl text-pink-200"></i>
                                        </div>
                                        <p>Your basket is empty!</p>
                                    </div>
                                ) : (
                                    cart.map(item => (
                                        <div key={item.cartId} className="flex gap-4 border-b border-gray-100 pb-5">
                                            <img src={item.img} className="w-20 h-20 object-cover rounded-2xl" />
                                            <div className="flex-1">
                                                <h4 className="font-bold text-gray-800 leading-tight">{item.name}</h4>
                                                <div className="flex items-center justify-between mt-2">
                                                    <p className="text-pink-600 font-extrabold text-lg">₹{item.price}</p>
                                                    <button onClick={() => removeFromCart(item.cartId)} className="text-gray-300 hover:text-red-500 transition">
                                                        <i className="fa-solid fa-trash-can"></i>
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>

                            {cart.length > 0 && (
                                <div className="p-8 bg-gray-50 border-t mt-auto rounded-3xl -mx-8 -mb-8">
                                    <div className="flex justify-between items-end mb-6">
                                        <span className="text-gray-500 font-medium">Order Total</span>
                                        <span className="text-4xl font-extrabold text-gray-900 tracking-tight">₹{cartTotal}</span>
                                    </div>
                                    <button className="w-full bg-pink-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-pink-700 transition shadow-xl shadow-pink-100">
                                        Place Order Now
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
