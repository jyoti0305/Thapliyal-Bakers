<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thapliyal Bakers | Premium Cakes & More</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .cart-sidebar { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        const PRODUCTS = [
            { id: 1, name: "Chocolate Truffle Cake", price: 599, category: "Cakes", img: "https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=400" },
            { id: 2, name: "Red Velvet Delight", price: 749, category: "Cakes", img: "https://images.unsplash.com/photo-1614707267537-b85aaf00c4b7?w=400" },
            { id: 3, name: "Vanilla Cupcake (Set of 6)", price: 399, category: "Cupcakes", img: "https://images.unsplash.com/photo-1550617931-e17a7b70dce2?w=400" },
            { id: 4, name: "Fresh Fruit Cake", price: 899, category: "Cakes", img: "https://images.unsplash.com/photo-1535141192574-5d4897c825a1?w=400" },
            { id: 5, name: "Choco Lava Cupcake", price: 149, category: "Cupcakes", img: "https://images.unsplash.com/photo-1576618148400-f54bed99fcfd?w=400" },
            { id: 6, name: "Butterscotch Crunch", price: 549, category: "Cakes", img: "https://images.unsplash.com/photo-1563729784474-d77dbb933a9e?w=400" },
        ];

        function App() {
            const [cart, setCart] = useState([]);
            const [searchTerm, setSearchTerm] = useState("");
            const [activeCategory, setActiveCategory] = useState("All");
            const [isCartOpen, setIsCartOpen] = useState(false);

            // Filtering Logic
            const filteredProducts = useMemo(() => {
                return PRODUCTS.filter(p => 
                    (activeCategory === "All" || p.category === activeCategory) &&
                    p.name.toLowerCase().includes(searchTerm.toLowerCase())
                );
            }, [searchTerm, activeCategory]);

            const addToCart = (product) => {
                setCart([...cart, { ...product, cartId: Date.now() }]);
                setIsCartOpen(true);
            };

            const removeFromCart = (cartId) => {
                setCart(cart.filter(item => item.cartId !== cartId));
            };

            const cartTotal = cart.reduce((sum, item) => sum + item.price, 0);

            return (
                <div className="min-h-screen bg-gray-50">
                    {/* Header */}
                    <nav className="bg-white shadow-sm sticky top-0 z-40">
                        <div className="container mx-auto px-4 py-3 flex justify-between items-center">
                            <h1 className="text-2xl font-black text-pink-600 tracking-tighter">THAPLIYAL BAKERS</h1>
                            <div className="flex-1 max-w-md mx-8 hidden md:block">
                                <input 
                                    type="text" 
                                    placeholder="Search for cakes, desserts..." 
                                    className="w-full bg-gray-100 border-none rounded-full px-5 py-2 focus:ring-2 focus:ring-pink-500 outline-none"
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                            </div>
                            <button onClick={() => setIsCartOpen(true)} className="relative p-2">
                                <i className="fa-solid fa-cart-shopping text-xl text-gray-700"></i>
                                {cart.length > 0 && (
                                    <span className="absolute -top-1 -right-1 bg-pink-600 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center font-bold">
                                        {cart.length}
                                    </span>
                                )}
                            </button>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <header className="bg-pink-100 py-10 text-center">
                        <h2 className="text-4xl font-bold text-gray-800">Cakes Baked with Love ❤️</h2>
                        <p className="text-gray-600 mt-2">Special Midnight & Same Day Delivery</p>
                    </header>

                    {/* Filters */}
                    <div className="container mx-auto px-4 py-6 flex gap-4 overflow-x-auto no-scrollbar">
                        {["All", "Cakes", "Cupcakes", "Personalized"].map(cat => (
                            <button 
                                key={cat}
                                onClick={() => setActiveCategory(cat)}
                                className={`px-6 py-2 rounded-full whitespace-nowrap transition ${activeCategory === cat ? 'bg-pink-600 text-white' : 'bg-white border text-gray-600 hover:border-pink-500'}`}
                            >
                                {cat}
                            </button>
                        ))}
                    </div>

                    {/* Product Grid */}
                    <main className="container mx-auto px-4 pb-20">
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                            {filteredProducts.map(product => (
                                <div key={product.id} className="bg-white rounded-2xl shadow-sm hover:shadow-xl transition overflow-hidden group">
                                    <div className="h-64 overflow-hidden">
                                        <img src={product.img} className="w-full h-full object-cover group-hover:scale-110 transition duration-500" />
                                    </div>
                                    <div className="p-5">
                                        <span className="text-xs font-bold text-pink-500 uppercase">{product.category}</span>
                                        <h3 className="text-lg font-bold text-gray-800 mt-1">{product.name}</h3>
                                        <div className="flex justify-between items-center mt-4">
                                            <span className="text-xl font-black text-gray-900">₹{product.price}</span>
                                            <button 
                                                onClick={() => addToCart(product)}
                                                className="bg-pink-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-pink-700 active:scale-95 transition"
                                            >
                                                Add to Cart
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* Cart Sidebar */}
                    <div className={`fixed inset-0 z-50 ${isCartOpen ? 'visible' : 'invisible'}`}>
                        <div className={`absolute inset-0 bg-black/50 transition-opacity ${isCartOpen ? 'opacity-100' : 'opacity-0'}`} onClick={() => setIsCartOpen(false)}></div>
                        <div className={`absolute right-0 top-0 h-full w-full max-w-md bg-white shadow-2xl p-6 cart-sidebar ${isCartOpen ? 'translate-x-0' : 'translate-x-full'}`}>
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-2xl font-bold">Your Basket ({cart.length})</h2>
                                <button onClick={() => setIsCartOpen(false)} className="text-2xl">&times;</button>
                            </div>

                            <div className="flex-1 overflow-y-auto h-[70vh]">
                                {cart.length === 0 ? (
                                    <div className="text-center py-20 text-gray-400">Your cart is empty</div>
                                ) : (
                                    cart.map(item => (
                                        <div key={item.cartId} className="flex gap-4 mb-4 border-b pb-4">
                                            <img src={item.img} className="w-20 h-20 object-cover rounded" />
                                            <div className="flex-1">
                                                <h4 className="font-bold">{item.name}</h4>
                                                <p className="text-pink-600 font-bold">₹{item.price}</p>
                                                <button onClick={() => removeFromCart(item.cartId)} className="text-red-500 text-sm mt-1 underline">Remove</button>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>

                            {cart.length > 0 && (
                                <div className="absolute bottom-0 left-0 w-full p-6 bg-gray-50 border-t">
                                    <div className="flex justify-between text-xl font-bold mb-4">
                                        <span>Total:</span>
                                        <span>₹{cartTotal}</span>
                                    </div>
                                    <button className="w-full bg-pink-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-pink-700 transition">
                                        Checkout Now
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
