<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thapliyal Bakers | Premium Cakes & More</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Modern Script Font for Thapliyal Bakers */
        .brand-font {
            font-family: 'Pacifico', cursive;
        }
        /* Base font for all other text */
        body {
            font-family: 'Quicksand', sans-serif;
        }
        .cart-sidebar { 
            transition: transform 0.3s ease-in-out; 
        }
        .no-scrollbar::-webkit-scrollbar { 
            display: none; 
        }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // --- ZAROOORI ---
        // Production ke liye, ise "logo.jpg" ya apni image file ke path se badal dein.
        // Abhi ke liye, ye ek temporary hosted link use kar raha hai test ke liye.
        const LOGO_URL = "https://i.ibb.co/C5m9XvP/logo-baker.jpg"; 

        const PRODUCTS = [
            { id: 1, name: "Chocolate Truffle Cake", price: 599, category: "Cakes", img: "https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=500" },
            { id: 2, name: "Red Velvet Delight", price: 749, category: "Cakes", img: "https://images.unsplash.com/photo-1614707267537-b85aaf00c4b7?w=500" },
            { id: 3, name: "Vanilla Cupcake (Set of 6)", price: 399, category: "Cupcakes", img: "https://images.unsplash.com/photo-1550617931-e17a7b70dce2?w=500" },
            { id: 4, name: "Fresh Fruit Cake", price: 899, category: "Cakes", img: "https://images.unsplash.com/photo-1535141192574-5d4897c825a1?w=500" },
            { id: 5, name: "Choco Lava Cupcake", price: 149, category: "Cupcakes", img: "https://images.unsplash.com/photo-1576618148400-f54bed99fcfd?w=500" },
            { id: 6, name: "Butterscotch Crunch", price: 549, category: "Cakes", img: "https://images.unsplash.com/photo-1563729784474-d77dbb933a9e?w=500" },
        ];

        function App() {
            const [cart, setCart] = useState([]);
            const [searchTerm, setSearchTerm] = useState("");
            const [activeCategory, setActiveCategory] = useState("All");
            const [isCartOpen, setIsCartOpen] = useState(false);

            const filteredProducts = useMemo(() => {
                return PRODUCTS.filter(p => 
                    (activeCategory === "All" || p.category === activeCategory) &&
                    p.name.toLowerCase().includes(searchTerm.toLowerCase())
                );
            }, [searchTerm, activeCategory]);

            const addToCart = (product) => {
                setCart([...cart, { ...product, cartId: Date.now() }]);
                setIsCartOpen(true);
            };

            const removeFromCart = (cartId) => {
                setCart(cart.filter(item => item.cartId !== cartId));
            };

            const cartTotal = cart.reduce((sum, item) => sum + item.price, 0);

            return (
                <div className="min-h-screen">
                    {/* Professional Header */}
                    <nav className="bg-white border-b sticky top-0 z-40 px-4 py-2">
                        <div className="container mx-auto flex items-center justify-between">
                            
                            {/* Left: Balanced Search Icon */}
                            <div className="flex-1 flex md:hidden">
                                <i className="fa-solid fa-magnifying-glass text-xl text-gray-500"></i>
                            </div>

                            {/* Centered Professional Logo & Brand */}
                            <div className="flex items-center gap-6">
                                {/* Large cut-out style Logo Badge */}
                                <div className="relative p-1 bg-white rounded-full shadow-lg border-2 border-pink-100">
                                    <img 
                                        src={LOGO_URL} 
                                        alt="Thapliyal Bakers Logo" 
                                        className="h-24 w-24 md:h-32 md:w-32 rounded-full object-cover ring-4 ring-pink-50"
                                        onError={(e) => {
                                            e.target.src = 'https://via.placeholder.com/150x150?text=Logo';
                                            e.target.onerror = null;
                                        }}
                                    />
                                    {/* Optional subtle glow overlay */}
                                    <div className="absolute inset-0 rounded-full shadow-inner pointer-events-none"></div>
                                </div>
                                <h1 className="brand-font text-3xl md:text-5xl text-pink-700 tracking-tight">
                                    Thapliyal Bakers
                                </h1>
                            </div>

                            {/* Right: Cart Button */}
                            <div className="flex-1 flex justify-end">
                                <button onClick={() => setIsCartOpen(true)} className="relative p-2.5 bg-pink-50 rounded-full text-pink-600 hover:bg-pink-100 transition shadow-sm">
                                    <i className="fa-solid fa-bag-shopping text-2xl"></i>
                                    {cart.length > 0 && (
                                        <span className="absolute -top-1 -right-1 bg-pink-600 text-white text-[10px] rounded-full h-5 w-5 flex items-center justify-center font-bold ring-2 ring-white">
                                            {cart.length}
                                        </span>
                                    )}
                                </button>
                            </div>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <header className="bg-pink-100 py-16 text-center px-4 mt-[-20px]"> {/* Pulled up slightly to integrate better */}
                        <div className="container mx-auto max-w-4xl">
                            <h2 className="text-4xl md:text-5xl font-extrabold text-gray-900 mb-4 tracking-tight">
                                Cakes Baked with Love ❤️
                            </h2>
                            <p className="text-gray-700 text-lg md:text-xl font-medium">
                                Special Midnight & Same Day Delivery
                            </p>
                            {/* Integrated Search Bar on Hero for larger screen attention */}
                            <div className="max-w-xl mx-auto mt-10 relative">
                                <i className="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-gray-400"></i>
                                <input 
                                    type="text" 
                                    placeholder="Search for delicious cakes, desserts..." 
                                    className="w-full bg-white border-none rounded-full px-14 py-3.5 text-lg shadow-inner focus:ring-2 focus:ring-pink-500 outline-none"
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                            </div>
                        </div>
                    </header>

                    {/* Category Filters */}
                    <div className="container mx-auto px-4 py-8 flex gap-4 overflow-x-auto no-scrollbar">
                        {["All", "Cakes", "Cupcakes", "Personalized"].map(cat => (
                            <button 
                                key={cat}
                                onClick={() => setActiveCategory(cat)}
                                className={`px-8 py-3 rounded-full text-base font-semibold whitespace-nowrap transition shadow-sm ${activeCategory === cat ? 'bg-pink-600 text-white' : 'bg-white border text-gray-600 hover:border-pink-500'}`}
                            >
                                {cat}
                            </button>
                        ))}
                    </div>

                    {/* Product Grid */}
                    <main className="container mx-auto px-4 pb-24">
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10">
                            {filteredProducts.map(product => (
                                <div key={product.id} className="bg-white rounded-3xl border border-gray-100 overflow-hidden hover:shadow-2xl hover:shadow-pink-100/50 transition-all duration-300 group">
                                    <div className="relative h-72 overflow-hidden">
                                        <img src={product.img} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
                                        <div className="absolute top-4 left-4 bg-white/90 backdrop-blur-sm px-3 py-1.5 rounded-full text-xs font-bold uppercase text-pink-600 tracking-wider">
                                            {product.category}
                                        </div>
                                    </div>
                                    <div className="p-7">
                                        <h3 className="text-xl font-bold text-gray-800 mb-1">{product.name}</h3>
                                        <div className="flex justify-between items-end mt-6">
                                            <span className="text-3xl font-extrabold text-gray-900">₹{product.price}</span>
                                            <button 
                                                onClick={() => addToCart(product)}
                                                className="bg-pink-600 text-white px-6 py-3 rounded-2xl font-bold hover:bg-pink-700 active:scale-95 transition"
                                            >
                                                Add to Bag
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* Cart Sidebar */}
                    <div className={`fixed inset-0 z-50 ${isCartOpen ? 'visible' : 'invisible'}`}>
                        <div className={`absolute inset-0 bg-black/40 transition-opacity ${isCartOpen ? 'opacity-100' : 'opacity-0'}`} onClick={() => setIsCartOpen(false)}></div>
                        <div className={`absolute right-0 top-0 h-full w-full max-w-md bg-white shadow-2xl p-7 cart-sidebar flex flex-col ${isCartOpen ? 'translate-x-0' : 'translate-x-full'}`}>
                            <div className="flex justify-between items-center mb-7">
                                <h2 className="text-2xl font-bold flex items-center gap-2">
                                    <i className="fa-solid fa-basket-shopping text-pink-500"></i>
                                    My Basket ({cart.length})
                                </h2>
                                <button onClick={() => setIsCartOpen(false)} className="h-10 w-10 flex items-center justify-center rounded-full bg-gray-50 hover:bg-gray-100 transition text-gray-500">
                                    <i className="fa-solid fa-xmark text-lg"></i>
                                </button>
                            </div>

                            <div className="flex-1 overflow-y-auto space-y-6 pr-2">
                                {cart.length === 0 ? (
                                    <div className="h-full flex flex-col items-center justify-center text-center py-20 text-gray-400">
                                        <div className="h-24 w-24 bg-gray-100 rounded-full flex items-center justify-center mb-5">
                                            <i className="fa-solid fa-cake-candles text-4xl text-gray-300"></i>
                                        </div>
                                        <p>Your basket is looking empty!</p>
                                    </div>
                                ) : (
                                    cart.map(item => (
                                        <div key={item.cartId} className="flex gap-4 border-b pb-5 last:border-0 last:pb-0">
                                            <img src={item.img} className="w-20 h-20 object-cover rounded-2xl" />
                                            <div className="flex-1 flex flex-col justify-center">
                                                <h4 className="font-bold text-gray-800 leading-tight">{item.name}</h4>
                                                <div className="flex items-center justify-between mt-2">
                                                    <p className="text-pink-600 font-extrabold text-lg">₹{item.price}</p>
                                                    <button onClick={() => removeFromCart(item.cartId)} className="text-gray-300 hover:text-red-500 transition">
                                                        <i className="fa-solid fa-trash-can text-sm"></i>
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>

                            {cart.length > 0 && (
                                <div className="p-7 bg-gray-50 border-t mt-auto rounded-t-3xl -mx-7 -mb-7">
                                    <div className="flex justify-between items-end mb-5">
                                        <span className="text-gray-500 font-medium">Order Total</span>
                                        <span className="text-3xl font-extrabold text-gray-900 tracking-tight">₹{cartTotal}</span>
                                    </div>
                                    <button className="w-full bg-pink-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-pink-700 transition">
                                        Continue to Checkout
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
